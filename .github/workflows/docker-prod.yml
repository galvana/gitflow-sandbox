# Real prod publish: on a published GitHub Release, build the image and push it
# to DockerHub tagged <version> + :latest. Fired by Finish's gh release create,
# mirroring fidesplus's release.yml (release: released -> nox build/push -- prod).
name: Docker prod publish

on:
  release:
    types: [released]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }} # build the released tag

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build + push prod image
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
        run: |
          uv sync --all-groups
          uv run nox -s build
          uv run nox -s push -- prod
