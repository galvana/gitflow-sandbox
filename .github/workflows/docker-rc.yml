# Real RC publish: on an rcN tag, build the (minimal) image and push it to
# DockerHub tagged <version>rcN + a constant :rc. Mirrors fidesplus's
# nox build/push approach (docker/login-action + nox build + nox push -- rc).
name: Docker RC publish

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # setuptools-scm needs full history + the tag

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build + push rc image
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
        run: |
          uv sync --all-groups
          uv run nox -s build
          uv run nox -s push -- rc
