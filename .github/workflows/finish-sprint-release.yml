# Gitflow: ship a sprint release.
#
# Verifies the release -> main PR is approved + green, merges it as a MERGE
# COMMIT, creates the GitHub Release (which fires release.yml prod publish +
# release_event.yml), then opens the release -> dev back-merge PR and
# auto-merges it (merge commit) when clean. The release branch is kept.
#
# Every step is idempotent: re-running after a partial failure resumes where it
# left off (already-merged PRs / existing release are detected and skipped),
# so a failed run can simply be re-dispatched once the blocker is cleared.
name: Finish Sprint Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to finish, e.g. 2.89.0 (blank = the single open release/* branch)"
        required: false
        type: string

permissions:
  contents: read # all writes go through the GitHub App token below

jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app
        with:
          app-id: ${{ secrets.MERGE_BOT_APP_ID }}
          private-key: ${{ secrets.MERGE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Resolve version + branch
        id: ver
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_VERSION" ]]; then
            V="$INPUT_VERSION"
          else
            mapfile -t branches < <(git ls-remote --heads origin 'release/*' | sed -E 's#.*refs/heads/release/##')
            if [[ "${#branches[@]}" -ne 1 ]]; then
              echo "::error::Expected exactly one release/* branch, found: ${branches[*]:-none}. Pass version explicitly."; exit 1
            fi
            V="${branches[0]}"
          fi
          B="release/$V"
          # Precondition: the release branch must exist (Start creates it; it is kept after Finish).
          if ! git ls-remote --exit-code --heads origin "$B" >/dev/null 2>&1; then
            echo "::error::Branch $B does not exist on origin. Run Start Sprint Release first (or it was deleted)."; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "branch=$B" >> "$GITHUB_OUTPUT"
          echo "Finishing release $V"

      - name: Compile changelog on release branch
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          V: ${{ steps.ver.outputs.version }}
          B: ${{ steps.ver.outputs.branch }}
        run: |
          set -euo pipefail
          # Idempotency: once release -> main is merged, the changelog is already compiled.
          merged=$(gh pr list --head "$B" --base main --state merged --json number -q '.[0].number' || true)
          if [[ -n "$merged" ]]; then echo "already merged; skipping changelog compile."; exit 0; fi

          git fetch -q origin "$B"
          git checkout -q -B "$B" "origin/$B"
          uv sync --all-groups
          # Compile this release's fragments into CHANGELOG.md and delete them.
          uv run nox -s "changelog(write)" -- --release "$V"
          if git diff --quiet; then
            echo "no changelog changes to commit"
          else
            git config user.name "gitflow-bot"
            git config user.email "gitflow-bot@users.noreply.github.com"
            git commit -qam "chore: compile changelog for $V"
            # App bypasses the release ruleset; pushing here restarts the PR checks.
            git push origin "HEAD:$B"
            echo "compiled changelog + pushed to $B"
          fi

      - name: Merge release -> main (gated, idempotent)
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          V: ${{ steps.ver.outputs.version }}
          B: ${{ steps.ver.outputs.branch }}
        run: |
          set -euo pipefail
          # Idempotency: if a branch -> main PR is already merged, this step is done.
          merged=$(gh pr list --head "$B" --base main --state merged --json number -q '.[0].number' || true)
          if [[ -n "$merged" ]]; then
            echo "release -> main already merged via #$merged; skipping."
            exit 0
          fi

          PR=$(gh pr list --head "$B" --base main --state open --json number -q '.[0].number')
          if [[ -z "$PR" ]]; then
            echo "No open $B -> main PR; opening one for tracking."
            PR=$(gh pr create --base main --head "$B" \
              --title "Release $V" \
              --body "Release \`$V\` -> main (opened by Finish Sprint Release for tracking)." \
              --label release | grep -oE '[0-9]+$')
          fi

          review=$(gh pr view "$PR" --json reviewDecision -q .reviewDecision)
          if [[ "$review" != "APPROVED" && -n "$review" ]]; then  # SANDBOX temp-relax: pass when no review required
            echo "::error::release -> main PR #$PR not approved (state: ${review:-none})"; exit 1
          fi
          # Poll until checks settle (the changelog compile pushed a commit,
          # restarting this PR's checks). Fail fast on any failing check.
          for _ in $(seq 1 30); do
            failed=$(gh pr checks "$PR" --json bucket -q '[.[] | select(.bucket == "fail" or .bucket == "cancel")] | length' || true)
            if [[ "${failed:-0}" != "0" ]]; then
              echo "::error::release -> main PR #$PR has ${failed} failing check(s)"; exit 1
            fi
            pending=$(gh pr checks "$PR" --json bucket -q '[.[] | select(.bucket != "pass" and .bucket != "skipping")] | length' || true)
            [[ "${pending:-0}" == "0" ]] && break
            sleep 10
          done
          pending=$(gh pr checks "$PR" --json bucket -q '[.[] | select(.bucket != "pass" and .bucket != "skipping")] | length' || true)
          if [[ "${pending:-1}" != "0" ]]; then
            echo "::error::release -> main PR #$PR checks not green after wait"; exit 1
          fi

          # App is in the main ruleset bypass list, so this direct merge is allowed.
          gh pr merge "$PR" --merge

      - name: Create GitHub Release (fires prod publish)
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Idempotency: skip if the release/tag already exists.
          if gh release view "$V" >/dev/null 2>&1; then
            echo "Release $V already exists; skipping."; exit 0
          fi
          # tag == version (no v prefix), per setuptools-scm convention
          gh release create "$V" --target main --title "$V" --generate-notes

      - name: Open + auto-merge back-merge into dev (merge commit)
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          V: ${{ steps.ver.outputs.version }}
          B: ${{ steps.ver.outputs.branch }}
        run: |
          set -euo pipefail
          # Idempotency: if a branch -> dev PR is already merged, the back-merge is done.
          merged=$(gh pr list --head "$B" --base dev --state merged --json number -q '.[0].number' || true)
          if [[ -n "$merged" ]]; then
            echo "back-merge into dev already merged via #$merged; skipping."
            exit 0
          fi

          PR=$(gh pr list --head "$B" --base dev --state open --json number -q '.[0].number')
          if [[ -z "$PR" ]]; then
            PR=$(gh pr create --base dev --head "$B" \
              --title "Back-merge release $V into dev" \
              --body "Automated back-merge of \`$B\` into dev (merge commit). Auto-merges when clean; resolve here if conflicts." \
              --label backmerge | grep -oE '[0-9]+$')
          fi

          # Wait for GitHub to compute mergeability
          M=UNKNOWN
          for _ in $(seq 1 15); do
            M=$(gh pr view "$PR" --json mergeable -q .mergeable)
            [[ "$M" != "UNKNOWN" ]] && break
            sleep 4
          done

          if [[ "$M" == "MERGEABLE" ]]; then
            # App bypasses dev's squash queue to land this as a merge commit.
            gh pr merge "$PR" --merge
            echo "Back-merge #$PR merged"
          else
            gh pr comment "$PR" --body "Back-merge has conflicts ($M) - resolve manually, then merge with a **merge commit**. Re-running Finish will detect the merge and skip." || true
            echo "::error::Back-merge #$PR not clean ($M); PR #$PR left open for resolution"
            exit 1
          fi
